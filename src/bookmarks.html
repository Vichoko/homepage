<html lang="en">
<head>
    <title>VICHOKO.cl</title>
    <link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono|Space+Mono|VT323|IBM+Plex+Mono&effect=anaglyph&display=swap"
          rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div id="header"></div>
        <br>
        <div class="paragraph">
            <div id="toc"></div>
            <h2>AI & ML</h2>
            <ul>
                <li>
                    <h3>Reinforcement Learning</h3>
                    <ul>
                        <li><a href="https://rlhfbook.com/">RLHF Book</a></li>
                    </ul>
                </li>
                <li>
                    <h3>Best Practices</h3>
                    <ul>
                        <li><a href="https://developers.google.com/machine-learning/guides/rules-of-ml">Rules of Machine Learning</a></li>
                    </ul>
                </li>
                <li>
                    <h3>Recommendation Systems</h3>
                    <ul>
                        <li><a href="https://aman.ai/recsys/bias/">Bias in Recommendation Systems</a></li>
                    </ul>
                </li>
            </ul>

            <h2>Music</h2>
            <ul>
                <li><a href="https://www.last.fm/user/Vichoko">Last.fm</a></li>
            </ul>

            <h2>Hardware</h2>
            <ul>
                <li>
                    <h3>CIDOO V75</h3>
                    <ul>
                        <li><a href="bookmarks/cidoo-v75.html">Command Reference</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
    <script>
        fetch("header.html")
          .then(r => r.text())
          .then(h => document.getElementById("header").innerHTML = h);
    </script>
    <script>
document.addEventListener("DOMContentLoaded", function() {
    var toc = document.getElementById("toc");
    var tocHeading = document.createElement("h2");
    tocHeading.textContent = "Table of Contents";
    toc.appendChild(tocHeading);
    var headingUl = document.createElement("ul");
    toc.appendChild(headingUl);

    var allHeadings = document.querySelectorAll("h2, h3");
    var headings = [];
    for (var i = 0; i < allHeadings.length; i++) {
        if (!allHeadings[i].closest("#toc")) {
            headings.push(allHeadings[i]);
        }
    }

    headings.forEach(function(h, i) {
        h.id = "heading" + i;
    });

    var lastLevel = 2;
    headings.forEach(function(h) {
        var level = parseInt(h.tagName.substring(1));
        var li = document.createElement("li");
        var a = document.createElement("a");
        a.textContent = h.textContent;
        a.href = "#" + h.id;
        li.appendChild(a);

        if (level === lastLevel) {
            headingUl.appendChild(li);
        } else if (level > lastLevel) {
            var newUl = document.createElement("ul");
            headingUl.lastElementChild.appendChild(newUl);
            newUl.appendChild(li);
        } else {
            headingUl.appendChild(li);
        }

        lastLevel = level;
    });
});
</script>
</body>
</html>
